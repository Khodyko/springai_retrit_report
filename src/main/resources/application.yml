spring:
  application:
    name: spring-ai-retrit
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1536
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

server:
  port: 8080

logging:
  level:
    com.example.retreat: INFO

retreat:
  search:
    similarity-threshold: 0.78
    top-k: 4
